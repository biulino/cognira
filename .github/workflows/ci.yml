name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emercado
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: estudos_mercado_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emercado"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://emercado:secret@localhost:5432/estudos_mercado_test
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          PII_KEY: dB9PY7jCzP9q6AKx8q6CTaD5W-OZpRP-kMLtGPP9W98=
          ENVIRONMENT: test
          MINIO_ENDPOINT: ""
          MINIO_ACCESS_KEY: ""
          MINIO_SECRET_KEY: ""
        working-directory: backend
        run: pytest -q --tb=short

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://q21.otokura.online
