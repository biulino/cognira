worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # ── Rate limiting zones ────────────────────────────
    limit_req_zone $binary_remote_addr zone=login:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_list:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/m;

    # ── Security headers ──────────────────────────────
    add_header X-Frame-Options       "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-XSS-Protection      "1; mode=block"   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    # ── Upstream ──────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream minio {
        server minio:9000;
    }

    server {
        listen 80;
        server_name _;

        # In production, redirect to HTTPS:
        # return 301 https://$host$request_uri;

        # ── API ───────────────────────────────────────
        location /api/auth/login {
            limit_req zone=login burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect http://backend/ /;
        }

        location /api/chat {
            limit_req zone=chat burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect http://backend/ /;
        }

        # WebSocket upgrade for real-time notifications
        # Force Upgrade: websocket unconditionally so the backend always
        # receives a proper WS handshake even when the upstream proxy
        # (Cloudflare Tunnel) strips the Upgrade header.
        location /api/ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade "websocket";
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Tighter limit on list/export endpoints to deter bulk scraping
        location ~* ^/api/(visitas|estabelecimentos|clientes|utilizadores|estudos)$ {
            limit_req zone=api_list burst=10 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect http://backend/ /;
        }

        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect http://backend/ /;
        }

        location /health {
            proxy_pass http://backend/health;
        }

        # ── MinIO object storage (public-URL proxy) ───
        # Allows browsers to access presigned MinIO URLs via /storage/ without
        # exposing the internal minio:9000 hostname. Set MINIO_PUBLIC_URL=/storage
        # (relative path served by this nginx) in the backend environment.
        location /storage/ {
            proxy_pass http://minio/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Do not forward Authorization header — MinIO uses presigned query params
            proxy_set_header Authorization "";
        }

        # ── Frontend ─────────────────────────────────

        # B2B landing — Basic Auth protected (informational / demo access)
        # /landing.html is the static file; /intro is the Next.js rewrite of the same content
        location = /landing.html {
            auth_basic "Cognira — Acesso Restrito";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /landing (no .html) — serve directly (Next.js rewrite handles it)
        location = /landing {
            auth_basic "Cognira — Acesso Restrito";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /intro {
            auth_basic "Cognira — Acesso Restrito";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Block bots from crawling JS bundles and source
        location /_next/static/ {
            add_header X-Robots-Tag "noindex, nofollow" always;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }

        # Service worker must never be cached — devices need to discover updates immediately
        location = /sw.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            # HTML pages must revalidate on every request so stale app shells are never served
            add_header Cache-Control "no-cache, must-revalidate" always;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
